name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Run validation
        run: |
          python -m pytest -q
          python -m py_compile cage-config.py netgate-proxy.py mcp-bridge.py mcp-relay host-cmd-bridge.py host-cmd-relay
          bash -n cage cage-netgate.sh entrypoint.sh entrypoint-codex.sh install.sh
          docker compose config

      - name: Run Docker integration smoke tests
        if: matrix.python-version == '3.12'
        env:
          CAGE_RUN_DOCKER_SMOKE: '1'
        run: python -m pytest -q tests/test_docker_smoke.py

  package:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SCRIPT_VER="$(grep '^CAGE_VERSION=' cage | cut -d'"' -f2)"
          if [ "$TAG" != "$SCRIPT_VER" ]; then
            echo "ERROR: Tag v${TAG} does not match CAGE_VERSION=\"${SCRIPT_VER}\" in cage script"
            exit 1
          fi
          echo "VERSION=$TAG" >> "$GITHUB_ENV"

      - name: Create tarball
        run: |
          DIST="cage-${VERSION}"
          mkdir "$DIST"
          cp cage cage-config.py cage-netgate.sh netgate-proxy.py mcp-bridge.py mcp-relay host-cmd-bridge.py host-cmd-relay \
             docker-compose.yml \
             Dockerfile Dockerfile.codex \
             entrypoint.sh entrypoint-codex.sh \
             install.sh Makefile README.md SECURITY.md CHANGELOG.md \
             "$DIST/"
          cp -r netgate "$DIST/"
          cp -r docs "$DIST/"
          tar czf "${DIST}.tar.gz" "$DIST"
          shasum -a 256 "${DIST}.tar.gz" > "${DIST}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: cage-release-${{ github.ref_name }}
          path: |
            cage-${{ env.VERSION }}.tar.gz
            cage-${{ env.VERSION }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  docker:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: claude-code
            dockerfile: Dockerfile
          - image: codex
            dockerfile: Dockerfile.codex
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Extract version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SCRIPT_VER="$(grep '^CAGE_VERSION=' cage | cut -d'"' -f2)"
          if [ "$TAG" != "$SCRIPT_VER" ]; then
            echo "ERROR: Tag v${TAG} != CAGE_VERSION=${SCRIPT_VER}"
            exit 1
          fi
          echo "VERSION=$TAG" >> "$GITHUB_ENV"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/sindycate/cage/${{ matrix.image }}:${{ env.VERSION }}
            ghcr.io/sindycate/cage/${{ matrix.image }}:latest

  release:
    needs: [package, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cage-release-${{ github.ref_name }}
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          DIST="cage-${VERSION}"
          gh release create "v${VERSION}" \
            --title "cage ${VERSION}" \
            --generate-notes \
            "dist/${DIST}.tar.gz" \
            "dist/${DIST}.tar.gz.sha256"
