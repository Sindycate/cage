name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  installer-macos-bash32:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Verify macOS system Bash installer path
        run: |
          /bin/bash --version | head -1
          python -m pytest -q tests/test_install_safety.py

  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Run validation
        run: |
          python -m pytest -q
          python -m py_compile cage-config.py netgate-proxy.py mcp-bridge.py mcp-relay host-cmd-bridge.py host-cmd-relay scripts/build-release.py
          bash -n cage cage-netgate.sh entrypoint.sh entrypoint-codex.sh install.sh
          docker compose config

      - name: Run Docker integration smoke tests
        env:
          CAGE_RUN_DOCKER_SMOKE: '1'
        run: python -m pytest -q tests/test_docker_smoke.py

  package:
    needs: [validate, installer-macos-bash32]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SCRIPT_VER="$(grep '^CAGE_VERSION=' cage | cut -d'"' -f2)"
          if [ "$TAG" != "$SCRIPT_VER" ]; then
            echo "ERROR: Tag v${TAG} does not match CAGE_VERSION=\"${SCRIPT_VER}\" in cage script"
            exit 1
          fi
          echo "VERSION=$TAG" >> "$GITHUB_ENV"
          echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct "$GITHUB_SHA")" >> "$GITHUB_ENV"

      - name: Create reproducible source archive
        run: python scripts/build-release.py "$VERSION"

      - name: Generate source archive SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          file: cage-${{ env.VERSION }}.tar.gz
          format: spdx-json
          output-file: cage-${{ env.VERSION }}.spdx.json
          syft-version: v1.44.0
          upload-artifact: false
          upload-release-assets: false

      - name: Attest source archive provenance
        uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35 # v4
        with:
          subject-path: cage-${{ env.VERSION }}.tar.gz

      - name: Attest source archive SBOM
        uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35 # v4
        with:
          subject-path: cage-${{ env.VERSION }}.tar.gz
          sbom-path: cage-${{ env.VERSION }}.spdx.json

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cage-release-${{ github.ref_name }}
          path: |
            cage-${{ env.VERSION }}.tar.gz
            cage-${{ env.VERSION }}.tar.gz.sha256
            cage-${{ env.VERSION }}.spdx.json
          if-no-files-found: error
          retention-days: 7

  docker:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        include:
          - image: claude-code
            dockerfile: Dockerfile
          - image: codex
            dockerfile: Dockerfile.codex
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Extract version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SCRIPT_VER="$(grep '^CAGE_VERSION=' cage | cut -d'"' -f2)"
          if [ "$TAG" != "$SCRIPT_VER" ]; then
            echo "ERROR: Tag v${TAG} != CAGE_VERSION=${SCRIPT_VER}"
            exit 1
          fi
          echo "VERSION=$TAG" >> "$GITHUB_ENV"

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          provenance: mode=max
          tags: |
            ghcr.io/sindycate/cage/${{ matrix.image }}:${{ env.VERSION }}
            ghcr.io/sindycate/cage/${{ matrix.image }}:latest

      - name: Attest container image provenance
        uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35 # v4
        with:
          subject-name: ghcr.io/sindycate/cage/${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

  release:
    needs: [package, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cage-release-${{ github.ref_name }}
          path: dist

      - name: Verify downloaded release payload
        working-directory: dist
        run: |
          sha256sum --check "cage-${GITHUB_REF_NAME#v}.tar.gz.sha256"
          test -s "cage-${GITHUB_REF_NAME#v}.spdx.json"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          DIST="cage-${VERSION}"
          gh release create "v${VERSION}" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "cage ${VERSION}" \
            --generate-notes \
            "dist/${DIST}.tar.gz" \
            "dist/${DIST}.tar.gz.sha256" \
            "dist/${DIST}.spdx.json"
