name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  installer-macos-bash32:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Verify macOS system Bash installer path
        run: |
          /bin/bash --version | head -1
          python -m pytest -q tests/test_install_safety.py

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Run Python tests
        run: python -m pytest -q

      - name: Run Docker integration smoke tests
        env:
          CAGE_RUN_DOCKER_SMOKE: '1'
        run: python -m pytest -q tests/test_docker_smoke.py

      - name: Check Python syntax
        run: python -m py_compile cage-config.py netgate-proxy.py mcp-bridge.py mcp-relay host-cmd-bridge.py host-cmd-relay scripts/build-release.py

      - name: Check shell syntax
        run: bash -n cage cage-netgate.sh entrypoint.sh entrypoint-codex.sh install.sh

      - name: Validate Compose configuration
        run: docker compose config
