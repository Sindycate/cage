name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  installer-macos-bash32:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Verify macOS system Bash installer path
        run: |
          /bin/bash --version | head -1
          python -m pytest -q tests/test_install_safety.py

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Run Python tests
        run: python -m pytest -q

      - name: Run Docker integration smoke tests
        env:
          CAGE_RUN_DOCKER_SMOKE: '1'
        run: python -m pytest -q tests/test_docker_smoke.py

      - name: Check Python syntax
        run: python -m py_compile cage-config.py netgate-proxy.py mcp-bridge.py mcp-relay host-cmd-bridge.py host-cmd-relay scripts/build-release.py

      - name: Check shell syntax
        run: bash -n cage cage-netgate.sh entrypoint.sh entrypoint-codex.sh install.sh

      - name: Validate Compose configuration
        run: docker compose config
